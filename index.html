<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Fonk Creator - Make Beats Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <i class="fa-solid fa-compact-disc"></i>
        <span>FONK CREATOR</span>
        <span class="badge">v1.0</span>
      </div>
      <div class="header-actions">
        <button class="btn-ghost" id="saveBtn">
          <i class="fa-solid fa-save"></i> Save Project
        </button>
        <button class="btn-ghost" id="loadBtn">
          <i class="fa-solid fa-folder-open"></i> Load
        </button>
        <button class="btn-primary" id="exportBtn">
          <i class="fa-solid fa-download"></i> Export MP3
        </button>
      </div>
    </header>

    <div class="main">
      <div class="sidebar">
        <div class="section">
          <h3><i class="fa-solid fa-sliders"></i> Transport</h3>
          <div class="transport">
            <button class="btn-circle play" id="playBtn">
              <i class="fa-solid fa-play"></i>
            </button>
            <button class="btn-circle" id="stopBtn">
              <i class="fa-solid fa-stop"></i>
            </button>
            <button class="btn-circle" id="recordBtn">
              <i class="fa-solid fa-circle"></i>
            </button>
          </div>
          <div class="field">
            <label>BPM</label>
            <input type="range" id="bpmSlider" min="60" max="200" value="140">
            <span id="bpmValue">140</span>
          </div>
          <div class="field">
            <label>Master Volume</label>
            <input type="range" id="masterVol" min="0" max="100" value="80">
          </div>
        </div>

        <div class="section">
          <h3><i class="fa-solid fa-drum"></i> Drum Kits</h3>
          <select id="kitSelect" class="select">
            <option value="trap">Trap Kit</option>
            <option value="boombap">Boom Bap</option>
            <option value="phonk">Phonk Kit</option>
            <option value="808">808 Heavy</option>
          </select>
        </div>

        <div class="section">
          <h3><i class="fa-solid fa-music"></i> Sample Packs</h3>
          <div class="sample-grid" id="sampleGrid">
            <button class="sample-pad" data-sample="kick">KICK</button>
            <button class="sample-pad" data-sample="snare">SNARE</button>
            <button class="sample-pad" data-sample="hihat">HI-HAT</button>
            <button class="sample-pad" data-sample="808">808</button>
            <button class="sample-pad" data-sample="clap">CLAP</button>
            <button class="sample-pad" data-sample="crash">CRASH</button>
            <button class="sample-pad" data-sample="percs">PERCS</button>
            <button class="sample-pad" data-sample="fx">FX</button>
          </div>
        </div>

        <div class="section">
          <h3><i class="fa-solid fa-upload"></i> Upload Sample</h3>
          <input type="file" id="sampleUpload" accept="audio/*" hidden>
          <button class="btn-secondary" id="uploadBtn">
            <i class="fa-solid fa-file-audio"></i> Add Your Sound
          </button>
          <div class="custom-samples" id="customSamples"></div>
        </div>
      </div>

      <div class="sequencer">
        <div class="sequencer-header">
          <h3><i class="fa-solid fa-table-cells"></i> Sequencer</h3>
          <div class="seq-controls">
            <button class="btn-sm" id="clearSeq">
              <i class="fa-solid fa-eraser"></i> Clear
            </button>
            <button class="btn-sm" id="randomizeBtn">
              <i class="fa-solid fa-dice"></i> Randomize
            </button>
          </div>
        </div>

        <div class="seq-grid" id="seqGrid">
          <!-- Generated by JS -->
        </div>

        <div class="piano-roll">
          <h3><i class="fa-solid fa-keyboard"></i> Piano Roll - Bass/Melody</h3>
          <div class="piano" id="piano">
            <!-- Generated by JS -->
          </div>
        </div>
      </div>
    </div>

    <div class="mixer">
      <h3><i class="fa-solid fa-sliders"></i> Mixer</h3>
      <div class="mixer-channels" id="mixerChannels">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <input type="file" id="projectLoad" accept=".json" hidden>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>
  <script src="./app.js"></script>
</body>
            </html>
